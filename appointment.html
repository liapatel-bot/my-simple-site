<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - StyleCut Salon</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: #eee;
        }
        header, nav, footer { /* Reuse same style as index.html */ 
            background: linear-gradient(#2c2c2c, #111);
            padding: 2rem 0;
            text-align: center;
        }
        nav a { color: #ffd700; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .form-container {
            max-width: 700px;
            margin: 40px auto;
            background: #222;
            padding: 40px;
            border-radius: 12px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #555;
            color: #eee;
            border-radius: 6px;
        }
        button {
            background: #ffd700;
            color: #111;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        button:hover { background: #ffed8f; }
    </style>
</head>
<body>
    <header>
        <h1>StyleCut Salon</h1>
        <p>Book Your Appointment</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="appointment.html">Book Appointment</a>
    </nav>

    <div class="form-container">
        <h2 style="text-align:center; color:#ffd700;">Make an Appointment</h2>
        
        <!-- Replace YOUR_EMAIL_HERE with your real email -->
        <form action="https://formspree.io/f/YOUR_CODE_HERE" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="email" name="email" placeholder="Email Address" required>
            
            <select name="service" required>
                <option value="">Select Service</option>
                <option value="Haircut + Style">$35 - Haircut + Style</option>
                <option value="Beard Trim">$20 - Beard Trim</option>
                <option value="Hair Color">$65+ - Hair Color</option>
                <option value="Kids Haircut">$25 - Kids Haircut</option>
            </select>
            
            <input type="date" name="date" required>
            <input type="time" name="time" required>
            
            <textarea name="notes" rows="4" placeholder="Additional notes (preferred stylist, special requests, etc.)"></textarea>
            
            <button type="submit">Submit Booking Request</button>
        </form>
    </div>

    <footer>
        <p>We'll confirm your appointment within 24 hours</p>
    </footer>
</body>
</html>
