<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { font-family: Arial; background:#1a1a1a; color:#eee; padding:40px; text-align:center; }
        button { background:#ffd700; color:#111; padding:15px 30px; font-size:1.2rem; border:none; border-radius:50px; }
        #result { margin-top:20px; padding:20px; border-radius:10px; }
    </style>
</head>
<body>
    <h1>EmailJS Test</h1>
    <button onclick="sendTest()">Send Test Email</button>
    <div id="result"></div>

    <script>
        emailjs.init("I5TSWQG0NMQGy0UdU");

        function sendTest() {
            const result = document.getElementById('result');
            result.innerHTML = "Sending...";

            emailjs.send("service_0o9dce2", "template_jm8o97r", {
                name: "Test Customer",
                email: "your_own_email@gmail.com",   // ← Change this to your real email first
                service: "Haircut + Style",
                date: "2026-05-20",
                time: "14:00",
                price: "35"
            })
            .then(() => {
                result.style.background = "#006600";
                result.innerHTML = "✅ Status: Sent Successfully<br>Check your inbox + Spam";
            })
            .catch(err => {
                result.style.background = "#660000";
                result.innerHTML = "❌ Error: " + (err.text || err);
            });
        }
    </script>
</body>
</html>
